name: integration test
discover: jest --listTests --config="jest.integration.config.cjs"
run:
  command: |
    JEST_JUNIT_OUTPUT_FILE=<< outputs.junit >> jest \
      --config="jest.integration.config.cjs" \
      --reporters=jest-junit \
      --bail \
      << test.atoms >>
  environment:
    NODE_OPTIONS: '--experimental-vm-modules'
analysis:
  command: |
    CIRCLECI_COVERAGE=<< outputs.circleci-coverage >> jest \
      --config="jest.integration.config.cjs" \
      --bail 0 \
      << test.atoms >>
  environment:
    NODE_OPTIONS: '--experimental-vm-modules'
outputs:
  junit: junit/report.xml
  # Note that `outputs.circleci-coverage` does not need to be defined in most
  # cases. The testsuite command will auto-generate a value which is sufficient
  # for performing analysis.
  #
  # Since this package is tooling to produce the coverage output for the
  # testsuite command, we need to be able to make assertions against the
  # coverage content after the testsuite has run and produced the output.
  circleci-coverage: coverage.json
options:
  test-impact-analysis: true
